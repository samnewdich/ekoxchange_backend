services:
  mongo:
    image: mongo:7
    container_name: ansofra_mongo
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  postgres:
    image: postgres:17
    container_name: ansofra_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ansofra
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: ansofra_redis
    restart: always
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: ansofra_api
    depends_on:
      - mongo
      - postgres
      - redis
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mongo-data:
  postgres-data: